<!DOCTYPE html>
<html lang="en" style="background-color: rgba(0,0,0,0.0); width:100%; height: 100%;">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growtopia Player Support</title>
  <link rel="icon" type="image/png"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
    sizes="16x16" />
  <link rel="shortcut icon"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
    type="image/x-icon">
  <link rel="icon"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
    type="image/x-icon">
  <link media="all" rel="stylesheet"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/faq-main.css">
  <link media="all" rel="stylesheet"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/shop-custom.css">
  <link media="all" rel="stylesheet"
    href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/ingame-custom.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .modal-backdrop {
      background-color: rgba(0, 0, 0, 0.1) !important;
    }

    .modal-backdrop+div {
      overflow: auto;
    }

    .modal-body,
    .content {
      padding: 0;
    }

    .login-error {
      color: #c0392b;
      font-weight: 600;
      margin: 8px 0 12px;
      text-align: center;
      display: none;
    }

    .login-error.visible {
      display: block;
    }

    /* Compact dialog like the official chooser */
    #modalShow .modal-dialog {
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }

    #dialogTitle {
      font-size: 22px !important;
    }

    /* Official-style account chooser (Select an account to continue) */
    .account-choose {
      text-align: center;
      padding: 2px 0 4px;
    }

    .account-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 178px;
      margin: 0 auto 10px;
      padding: 8px 10px;
      background: #000;
      color: #fff;
      border: 1px solid #fff;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .account-btn:hover {
      background: #1a1a1a;
    }

    .account-btn img,
    .account-btn svg {
      display: block;
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
    }

    /* Real GIS button invisibly stacked over the styled Google pill */
    .google-overlay-wrap {
      position: relative;
      width: 178px;
      margin: 0 auto 10px;
    }

    .google-overlay-wrap .account-btn {
      margin: 0;
      width: 100%;
    }

    .google-overlay-wrap .g_id_signin {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.0001;
      overflow: hidden;
      z-index: 2;
    }

    .legacy-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 96%;
      margin: 16px auto 14px;
      color: #f7ecc7;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .gt-g-icon {
      color: #f5d949;
      font-weight: 900;
      font-size: 15px;
      line-height: 1;
      text-shadow: 0 1px 0 #7a6410;
    }

    .legacy-divider::before,
    .legacy-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #efe3ae;
    }

    .google-growid-panel {
      display: none;
      margin-top: 8px;
    }

    .google-growid-panel.visible {
      display: block;
    }
  </style>
</head>

<body style="background-color: rgba(0,0,0,0.0);">
  <button type="button" class="btn btn-primary hidden" data-toggle="modal" id="modalButton" data-target="#modalShow"
    data-backdrop="static" data-keyboard="false"></button>
  <div class="content">
    <section class="common-box ">
      <div class="container">
        <div class="row">
          <div class="col-md-12 col-sm-12">
            <div class="row">
              <div class="modal fade product-list-popup" id="modalShow" tabindex="-1" role="dialog" aria-hidden="false">
                <div class="modal-dialog modal-dialog-centered" role="document">
                  <div class="modal-content">
                    <div class="modal-body">
                      <div class="content">
                        <section class="common-box ">
                          <div class="container">
                            <div class="section-title center-align">
                              <h2 id="dialogTitle">Select an account to continue</h2>
                            </div>
                            <div class="row div-content-center">
                              <div class="col-md-12 col-sm-12">
                                <div id="loginError" class="login-error" role="alert"></div>

                                <!-- Step 1: official-style account chooser -->
                                <div id="accountChooser" class="account-choose">
                                  <div id="googleSection" class="google-overlay-wrap">
                                    <button type="button" class="account-btn" tabindex="-1">
                                      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                                      <span>Continue with Google</span>
                                    </button>
                                    <div id="g_id_onload"
                                      data-client_id="{{ google_client_id }}"
                                      data-context="signin"
                                      data-ux_mode="popup"
                                      data-callback="onGoogleCredential"
                                      data-auto_prompt="false">
                                    </div>
                                    <div class="g_id_signin"
                                      data-type="standard"
                                      data-shape="rectangular"
                                      data-theme="filled_black"
                                      data-text="continue_with"
                                      data-size="medium"
                                      data-width="178"
                                      data-logo_alignment="center">
                                    </div>
                                  </div>

                                  <div class="legacy-divider">Legacy users only</div>

                                  <button type="button" id="legacyButton" class="account-btn" style="border: 2px solid #f5d949;">
                                    <span class="gt-g-icon">G</span>
                                    <span>Growtopia Login</span>
                                  </button>

                                  <div id="googleGrowIdPanel" class="google-growid-panel">
                                    <p class="text-center" style="margin-bottom:8px;">Choose a GrowID for this Google account</p>
                                    <div class="form-group">
                                      <input id="google-growid" class="form-control grow-text" placeholder="Your Growtopia Name *"
                                        type="text" pattern="[A-Za-z0-9]+" maxlength="18">
                                    </div>
                                    <div class="form-group text-center">
                                      <button type="button" id="googleGrowIdSubmit" class="btn btn-lg btn-primary grow-button">Continue</button>
                                    </div>
                                  </div>
                                </div>

                                <!-- Step 2: legacy Grow ID login -->
                                <form method="POST" id="loginForm" action="/player/growid/login/validate"
                                  accept-charset="UTF-8" class="hidden" role="form" autocomplete="off">
                                  <input name="_token" type="hidden" value="{{ data }}">
                                  <div class="form-group">
                                    <input id="login-name" class="form-control grow-text" required="required"
                                      placeholder="Your Growtopia Name *" name="growId" value="" type="text"
                                      pattern="[A-Za-z0-9]+" title="Only letters and numbers are allowed">
                                  </div>
                                  <div class="form-group">
                                    <input id="password" class="form-control grow-text" required="required"
                                      placeholder="Your Growtopia Password *" name="password" type="password" value=""
                                      pattern="[A-Za-z0-9@._!\-]+"
                                      title="Only letters, numbers, and @ . _ ! - are allowed">
                                  </div>
                                  <div class="form-group text-center forgot-password">
                                    <a href="https://www.growtopiagame.com/account" target="_blank">Forgot Password</a>
                                    <br>
                                    <a href="#" id="toggleRegister" style="margin-top: 5px; display: inline-block;">Register Account</a>
                                  </div>
                                  <div class="form-group text-center">
                                    <input class="btn btn-lg btn-primary grow-button" type="submit" value="Log in">
                                  </div>
                                </form>
                                <form method="POST" id="registerForm" action="/player/growid/login/validate" accept-charset="UTF-8" class="hidden" role="form" autocomplete="off">
                                  <input name="_token" type="hidden" value="{{ data }}">
                                  <div class="form-group">
                                    <input id="register-name" class="form-control grow-text" required="required"
                                      placeholder="Your Growtopia Name *" name="growId" value="" type="text"
                                      pattern="[A-Za-z0-9]+" title="Only letters and numbers are allowed">
                                  </div>
                                  <div class="form-group">
                                    <input id="register-email" class="form-control grow-text" required="required"
                                      placeholder="Your Email *" name="email" value="" type="email">
                                  </div>
                                  <div class="form-group">
                                    <input id="register-password" class="form-control grow-text" required="required"
                                      placeholder="Your Growtopia Password *" name="password" type="password" value=""
                                      pattern="[A-Za-z0-9@._!\-]+"
                                      title="Only letters, numbers, and @ . _ ! - are allowed">
                                  </div>
                                  <div class="form-group">
                                    <input id="register-confirm-password" class="form-control grow-text" required="required"
                                      placeholder="Confirm Password *" name="password_confirmation" type="password" value=""
                                      pattern="[A-Za-z0-9@._!\-]+"
                                      title="Only letters, numbers, and @ . _ ! - are allowed">
                                  </div>
                                  <div class="form-group text-center">
                                    <a href="#" id="toggleLogin" style="margin-bottom: 10px; display: inline-block;">Back to Login</a>
                                  </div>
                                  <div class="form-group text-center">
                                    <input class="btn btn-lg btn-primary grow-button" type="submit" value="Register">
                                  </div>
                                </form>
                              </div>
                            </div>
                          </div>
                        </section>
                      </div>
                      <style>
                        .hidden {
                          display: none !important;
                        }
                      </style>
                      <script>
                        (function () {
                          const clientToken = '{{ data }}';
                          let pendingGoogleCredential = '';

                          function showError(message) {
                            const el = document.getElementById('loginError');
                            el.textContent = message || 'Login failed.';
                            el.classList.add('visible');
                          }

                          function clearError() {
                            const el = document.getElementById('loginError');
                            el.textContent = '';
                            el.classList.remove('visible');
                          }

                          /**
                           * Native POST to /validate so the WebView accepts the handoff like GrowID login.
                           * Must forward `reg` from the AJAX token — dropping it forced reg=0, so the game
                           * never created the account when GTLogin's DB insert wasn't visible to the server.
                           * Do NOT forward `email` here: that would re-enter the register path and hit
                           * "already taken" after we just created the row.
                           */
                          function handTokenToClient(data) {
                            let growId = '';
                            let password = '';
                            let reg = '0';
                            try {
                              const decoded = atob(data.token);
                              const params = new URLSearchParams(decoded);
                              growId = params.get('growId') || '';
                              password = params.get('password') || '';
                              reg = params.get('reg') || '0';
                            } catch (e) {}

                            if (!growId || !password) {
                              showError('Login token was incomplete. Try again.');
                              return;
                            }

                            const form = document.createElement('form');
                            form.method = 'POST';
                            form.action = '/player/growid/login/validate';
                            form.acceptCharset = 'UTF-8';
                            form.style.display = 'none';

                            const fields = {
                              _token: clientToken,
                              growId: growId,
                              password: password,
                              reg: reg,
                            };
                            Object.keys(fields).forEach(function (name) {
                              const input = document.createElement('input');
                              input.type = 'hidden';
                              input.name = name;
                              input.value = fields[name];
                              form.appendChild(input);
                            });

                            document.body.innerHTML =
                              '<div style="font-family:sans-serif;text-align:center;padding:48px;color:#333">' +
                              '<p>Signing in…</p></div>';
                            document.body.appendChild(form);
                            form.submit();
                          }

                          async function postForm(url, formData, submitButton, busyLabel) {
                            clearError();
                            const previous = submitButton.value;
                            submitButton.disabled = true;
                            submitButton.value = busyLabel;
                            try {
                              // Must be urlencoded — FormData alone is multipart and Express
                              // does not parse that, so req.body was undefined → 500.
                              const body = new URLSearchParams();
                              for (const [key, value] of formData.entries()) {
                                body.set(key, String(value));
                              }
                              const res = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body,
                                credentials: 'same-origin',
                              });
                              const data = await res.json();
                              if (data.status === 'success' && data.token) {
                                handTokenToClient(data);
                                return;
                              }
                              showError(data.message || 'Login failed.');
                              submitButton.disabled = false;
                              submitButton.value = previous;
                            } catch (err) {
                              showError('Network error. Please try again.');
                              submitButton.disabled = false;
                              submitButton.value = previous;
                            }
                          }

                          async function completeGoogleLogin(growId) {
                            clearError();
                            const panel = document.getElementById('googleGrowIdPanel');
                            const submit = document.getElementById('googleGrowIdSubmit');
                            submit.disabled = true;
                            submit.textContent = 'Signing in...';
                            try {
                              const body = new URLSearchParams();
                              body.set('credential', pendingGoogleCredential);
                              body.set('_token', clientToken);
                              if (growId) body.set('growId', growId);

                              const res = await fetch('/player/growid/login/google', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body,
                                credentials: 'same-origin',
                              });
                              const data = await res.json();

                              if (data.status === 'need_growid') {
                                panel.classList.add('visible');
                                const input = document.getElementById('google-growid');
                                if (!input.value && data.suggestedGrowId) input.value = data.suggestedGrowId;
                                submit.disabled = false;
                                submit.textContent = 'Continue';
                                return;
                              }
                              if (data.status === 'success' && data.token) {
                                handTokenToClient(data);
                                return;
                              }
                              showError(data.message || 'Google Sign-In failed.');
                              submit.disabled = false;
                              submit.textContent = 'Continue';
                            } catch (err) {
                              showError('Network error during Google Sign-In.');
                              submit.disabled = false;
                              submit.textContent = 'Continue';
                            }
                          }

                          window.onGoogleCredential = function (response) {
                            pendingGoogleCredential = response.credential;
                            completeGoogleLogin('');
                          };

                          document.addEventListener('DOMContentLoaded', function () {
                            const googleClientId = '{{ google_client_id }}';
                            if (!googleClientId) {
                              document.getElementById('googleSection').style.display = 'none';
                            }

                            const accountChooser = document.getElementById('accountChooser');
                            const loginForm = document.getElementById('loginForm');
                            const registerForm = document.getElementById('registerForm');
                            const toggleRegister = document.getElementById('toggleRegister');
                            const toggleLogin = document.getElementById('toggleLogin');
                            const sectionTitle = document.getElementById('dialogTitle');

                            document.getElementById('legacyButton').addEventListener('click', function () {
                              clearError();
                              accountChooser.classList.add('hidden');
                              registerForm.classList.add('hidden');
                              loginForm.classList.remove('hidden');
                              sectionTitle.textContent = 'Log in with your Grow ID';
                            });

                            toggleRegister.addEventListener('click', function (e) {
                              e.preventDefault();
                              clearError();
                              loginForm.classList.add('hidden');
                              registerForm.classList.remove('hidden');
                              sectionTitle.textContent = 'Register your Grow ID';
                            });

                            toggleLogin.addEventListener('click', function (e) {
                              e.preventDefault();
                              clearError();
                              registerForm.classList.add('hidden');
                              loginForm.classList.remove('hidden');
                              sectionTitle.textContent = 'Log in with your Grow ID';
                            });

                            const loginSubmitButton = loginForm.querySelector('input[type="submit"]');
                            const loginNameInput = document.getElementById('login-name');
                            const passwordInput = document.getElementById('password');

                            loginNameInput.addEventListener('input', function () {
                              this.value = this.value.replace(/[^A-Za-z0-9]/g, '');
                            });

                            passwordInput.addEventListener('input', function () {
                              this.value = this.value.replace(/[^A-Za-z0-9@._!\-]/g, '');
                            });

                            loginForm.addEventListener('submit', function (e) {
                              e.preventDefault();
                              if (loginSubmitButton.disabled) return false;
                              postForm(
                                loginForm.action,
                                new FormData(loginForm),
                                loginSubmitButton,
                                'Logging in...',
                              );
                            });

                            const registerSubmitButton = registerForm.querySelector('input[type="submit"]');
                            const registerNameInput = document.getElementById('register-name');
                            const registerPasswordInput = document.getElementById('register-password');
                            const registerConfirmPasswordInput = document.getElementById('register-confirm-password');

                            registerNameInput.addEventListener('input', function () {
                              this.value = this.value.replace(/[^A-Za-z0-9]/g, '');
                            });

                            registerPasswordInput.addEventListener('input', function () {
                              this.value = this.value.replace(/[^A-Za-z0-9@._!\-]/g, '');
                            });

                            registerConfirmPasswordInput.addEventListener('input', function () {
                              this.value = this.value.replace(/[^A-Za-z0-9@._!\-]/g, '');
                            });

                            registerForm.addEventListener('submit', function (e) {
                              e.preventDefault();
                              if (registerSubmitButton.disabled) return false;

                              if (registerPasswordInput.value !== registerConfirmPasswordInput.value) {
                                showError('Passwords do not match!');
                                return false;
                              }

                              postForm(
                                registerForm.action,
                                new FormData(registerForm),
                                registerSubmitButton,
                                'Registering...',
                              );
                            });

                            document.getElementById('google-growid').addEventListener('input', function () {
                              this.value = this.value.replace(/[^A-Za-z0-9]/g, '');
                            });

                            document.getElementById('googleGrowIdSubmit').addEventListener('click', function () {
                              const growId = document.getElementById('google-growid').value.trim();
                              if (!growId) {
                                showError('Enter a GrowID to continue.');
                                return;
                              }
                              completeGoogleLogin(growId);
                            });
                          });
                        })();
                      </script>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
<script
  src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/js/jquery-3.7.1.min.js"></script>
<script
  src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/js/bootstrap3.min.js"></script>
<script>
  let clicked = false;
  $("a").click(function () { if (clicked === false) { clicked = true; return true; } $(this).attr("onclick", "return false;"); });
  $('document').ready(function () {
    document.onkeydown = (e) => {
      if (e.key == 123) {
        e.preventDefault();
      }
      if (e.key == 'F12') {
        e.preventDefault();
      }
      if (e.ctrlKey && e.shiftKey && e.key == 'I') {
        e.preventDefault();
      }
      if (e.ctrlKey && e.key == 'I') {
        e.preventDefault();
      }
      if (e.ctrlKey && e.shiftKey && e.key == 'C') {
        e.preventDefault();
      }
      if (e.ctrlKey && e.shiftKey && e.key == 'J') {
        e.preventDefault();
      }
      if (e.ctrlKey && e.key == 'U') {
        e.preventDefault();
      }
    };
    $('#modalButton').trigger('click');
    $('.close').on('click', function () {
      window.location = "https://login.growtopiagame.com/player/validate/close"
    });

    var observer = new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        for (var i = 0; i < mutation.addedNodes.length; i++) {
          if (mutation.addedNodes[i].tagName == 'DIV') {
            var thediv = mutation.addedNodes[i];
            var sw = window.screen.width;
            if (sw < 667) {
              $(thediv).css({
                'transform': 'scale(0.75)',
                'transform-origin': '0 0',
                '-webkit-transform': 'scale(0.75)',
                '-webkit-transform-origin': '0 0',
                'overflow': 'auto'
              });
            }
          }
        }
      });
    });
    observer.observe(document.body, { attributes: false, childList: true, characterData: false });
  });
</script>

</html>
